<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Ciudades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>

<div class="container">
    <div class="main-container">
        <!-- Header -->

        <div class="header-section">

            <h1 class="display-4 mb-2"><i class="bi bi-globe-americas"></i> Gestor de Ciudades</h1>
            <p class="lead mb-0">Mapa meteorológico</p>
            
        </div>

            <!-- Tabla de Ciudades -->
        <div class="table-container">
            <h4>Busqueda:</h4>
            <input type="text" id="buscarCiudad" class="form-control mb-3" placeholder="Buscar ciudad por nombre o país..."><br>
            <h4 class="mb-3 text-primary">Lista de Ciudades</h4>
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>País</th>
                            <th>Latitud</th>
                            <th>Longitud</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyCiudad"></tbody>
                </table>
            </div>
        </div>


        <!-- Mapa -->
        <div class="map-container">
            <div class="map-title">
                <h5 class="mb-0 text-primary" id="tituloMapa">
                     Cargando tu ubicación...
                </h5>
                <select id="selectCapa">
                    <option disabled selected>Seleccione capa</option>
                    <option value="clouds_new">Nubes</option>
                    <option value="precipitation_new">Precipitación</option>
                    <option value="pressure_new">Presión</option>
                    <option value="wind_new">Viento</option>
                    <option value="temp_new">Temperatura</option>
                </select>
                <button onclick="obtenerUbicacionUsuario()" class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-geo-alt-fill"></i> Mi Ubicación
                </button>
                        </div>
            
            <div id="mapaMeteo" style="height: 450px; width: 100%; min-height: 450px;">
                <div id="panelInfo">
    <button onclick="cerrarPanel()" class="btn-cerrar">✕</button>
    <div id="contenidoInfo"></div>
</div>
            </div>
        </div>
 <a href="/AWOSVS/main/index.html" class="btn btn-outline-secondary me-3" style="align-items: center;">
            <b>＜Regresar</b>
            </a>
</div>
    </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="ciudades_viewer.js"></script>
</body>
</html>
