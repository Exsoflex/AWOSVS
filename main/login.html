<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio de Sesión</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            defer></script>

    <!-- Tu JS -->
    <script src="login.js" defer></script>

    <!-- TU CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="body-login">

    <div class="container">
        <div class="row justify-content-center">
            
            <div class="col-11 col-sm-10 col-md-6 col-lg-4">
                <div class="login-card">
                    <h2>Iniciar Sesión</h2>

                    <form id="frmLogin" method="POST">

                        <div class="mb-3">
                            <label for="txtUsuario" class="form-label">Usuario</label>
                            <input type="text" id="txtUsuario" name="txtUsuario" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="txtContrasena" class="form-label">Contraseña</label>
                            <input type="password" id="txtContrasena" name="txtContrasena" class="form-control">
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary w-100 me-2">Iniciar Sesión</button>
                            <button type="reset" class="btn btn-secondary w-100">Cancelar</button>
                        </div>
                         <a href="index_no_session.html" class="btn-cerrar">
                                                ✕
    <span class="tooltip-cerrar">Regresar sin login</span>
                                            </a>
                    </form>

                </div>
            </div>
        </div>



        
    </div>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                
                <div class="modal-header">
                    <h5 class="modal-title">Error</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Usuario o contraseña incorrectos
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Aceptar</button>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
