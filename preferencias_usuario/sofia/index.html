<!DOCTYPE html>
<html>
<head>
    <title>Preferencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="claro">

  

<div class="container mt-5">
    <h2>Agregar Preferencias</h2>
    <form id="formAgregarPreferencias" method="POST" class="p-4 border rounded">

        <div class="mb-3">
            <label for="txtusuario" class="form-label">ID Usuario</label>
            <input type="number" class="form-control" id="txtusuario" name="txtusuario" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Unidad de temperatura</label><br>
            <input type="radio" name="unidad" value="Celsius" checked> Celsius
            <input type="radio" name="unidad" value="Fahrenheit"> Fahrenheit
        </div>

        <div class="mb-3">
            <label class="form-label">Tema</label><br>
            <input type="radio" name="tema" value="claro" checked> Claro
            <input type="radio" name="tema" value="oscuro"> Oscuro
        </div>

        <button type="submit" id="btnAgregar" class="btn btn-success">Agregar Preferencias</button>
        <button type="submit" id="btnModificar" class="btn btn-warning">Modificar Preferencias</button>

      </form>







    <div class="container text-center mt-5">
        <h1>CLIMA</h1>
        <p>clic en el icono de la esquina superior izquierda para configurar tus preferencias.</p>
        <table class="table table-sm table-bordered">
            <thead>
                <tr>
                    <th>id_usuario</th>
                    <th>nombre</th>
                    <th>preferencias</th>
                       <th>Accion</th>

                </tr>
            </thead>
            <tbody id="tbodyProductos">
            </tbody>
        </table>




      <a href="/AWOSVS/main/index.html" class="btn btn-outline-secondary me-3">
            <b>< Regresar al menu principal</b>
        </a>

    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
